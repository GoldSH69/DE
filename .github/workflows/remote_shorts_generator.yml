name: Remote Shorts Generator

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: '쇼츠로 자동 가공할 대상 유튜브 동영상 주소(URL)'
        required: true
        type: string
      gemini_api_key:
        description: 'Gemini API Key (비워두면 모의 기획안 Mock 데이터로 구동)'
        required: false
        type: string
      voice:
        description: '일본어 나레이션 TTS 목소리'
        required: false
        default: 'ja-JP-NanamiNeural'
        type: choice
        options:
          - ja-JP-NanamiNeural
          - ja-JP-KeitaNeural
      youtube_cookies:
        description: 'YouTube Cookies (Netscape format) to bypass bot check'
        required: false
        type: string

jobs:
  build-and-cut:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install system FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        ffmpeg -version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Pipeline and Generate XML
      env:
        GEMINI_API_KEY: ${{ inputs.gemini_api_key || secrets.GEMINI_API_KEY }}
      run: |
        # 1. 아웃풋 디렉토리 생성
        mkdir -p output/video_cuts
        mkdir -p output/tts_voices
        # 만약 사용자 쿠키 입력값이 전달되었다면 output/cookies.txt 파일 기입
        if [ ! -z "${{ inputs.youtube_cookies }}" ]; then
          echo "${{ inputs.youtube_cookies }}" > output/cookies.txt
          echo "[Workflow] Custom cookies.txt written successfully to output/cookies.txt"
        fi
        # 2. 메인 파이프라인 기동 (첫 번째 인자로 비디오 URL 전달)
        python -m src.main "${{ inputs.video_url }}"

    - name: Upload Output Artifact (1-Day Retention)
      uses: actions/upload-artifact@v4
      with:
        name: dopamine-shorts-project
        path: output/
        retention-days: 1 # 1일이 지나면 깃허브 용량 확보를 위해 자동 완전 파괴
