name: Daily Trend Collector

on:
  schedule:
    # 매일 UTC 21:00 (한국 시간 오전 6시)에 자동 구동
    - cron: '0 21 * * *'
  workflow_dispatch: # 수동으로도 기동 가능하도록 설정

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp

    - name: Run Trend Collector
      run: |
        python src/collector.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "Github Actions Bot"
        git config --global user.email "actions@github.com"
        git add data/trends.json
        # 변경사항이 있을 때만 커밋 및 푸시
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update trends database [skip ci]" && git push)
